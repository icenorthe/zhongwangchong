name = "zhongwang-payment-bridge"
main = "src/index.mjs"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[vars]
PAYMENT_PROVIDER = "xpay_epay"
PAYMENT_PAY_TYPES = "wxpay"
RETURN_URL = "https://icenorth.pythonanywhere.com/"
PYTHONANYWHERE_BASE_URL = "https://icenorth.pythonanywhere.com"
CODEPAY_CHANNEL_ID = ""
XPAY_API_BASE = "https://pro.qjpay.icu"
PROVIDER_CREATE_PATH = "/mapi.php"
PROVIDER_QUERY_PATH = "/qjt.php?act=query_order"
PROVIDER_QUERY_METHOD = "post"
PROVIDER_QUERY_STYLE = "qjpay"
PROVIDER_SIGN_MODE = "concat"
